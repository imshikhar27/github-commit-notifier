name: Python CI Pipeline

on:
  push:
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Run Pipeline
        run: python pipeline.py

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Read Version
        id: version
        run: echo "VERSION=$(cat version.txt)" >> $GITHUB_ENV
      
      - name: Build Docker Image
        run: |
          docker build \
            -t imshikhar27/calculator-app:${{ env.VERSION }} \
            -t imshikhar27/calculator-app:latest \
            .

      - name: Push Docker Images
        run: |
          docker push imshikhar27/calculator-app:${{ env.VERSION }}
          docker push imshikhar27/calculator-app:latest

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: calculator-build
          path: dist/artifact.zip